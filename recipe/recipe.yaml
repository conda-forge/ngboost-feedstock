schema_version: 1

context:
  name: ngboost
  version: 0.5.9

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: c372b3635f4b3bafcf8c37fef50a34ec15bcd201e0708c188bce514ad544cec1

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - poetry-core >=1.0.0
  run:
    - python >=${{ python_min }},<3.13
    - numpy >=1.21.2
    - scipy >=1.7.2
    - scikit-learn >=1.6,<2
    - tqdm >=4.3
    - lifelines >=0.25
    - sympy >=1.12
    - pandas >=1.3.5
    - matplotlib-base >=3.10.0

tests:
  - python:
      imports:
        - ngboost
        - ngboost.distns
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Natural Gradient Boosting for Probabilistic Prediction
  description: |
    'ngboost is a Python library that implements Natural Gradient Boosting,
    as described in "NGBoost:
    Natural Gradient Boosting for Probabilistic Prediction".
    It is built on top of Scikit-Learn,
    and is designed to be scalable and modular
    with respect to choice of
    proper scoring rule, distribution, and base learners.'


  homepage: https://github.com/stanfordmlgroup/ngboost
  repository: https://github.com/stanfordmlgroup/ngboost
  documentation: https://github.com/stanfordmlgroup/ngboost

extra:
  recipe-maintainers:
    - ericmjl
    - avati
    - synapticarbors
